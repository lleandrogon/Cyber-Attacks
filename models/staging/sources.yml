version: 2

sources:
  - name: raw
    description: "Dados brutos dos ataques cibernéticos"
    schema: cyber_attacks
    loader: mysql

    tables:
      - name: raw_financial_impact
        description: "Tabela com dados financeiros dos ataques cibernéticos"
        columns:
          - name: incident_id
            description: Indentificador único do incidente
            tests:
              - not_null
              - unique
          - name: direct_loss_usd
            description: Perda direta pelo ataque cibernético
          - name: direct_loss_method
            description: Método utilizado no ataque
          - name: ransom_demanded_usd
            description: Valor de resgate exigido pelos atacantes
          - name: ransom_paid_usd
            description: Valor de resgate efetivamente pago aos atacantes
          - name: ransom_source
            description: Fonte de onde se originou o crime
          - name: recovery_cost
            description: Gastos da empresa com a recuperação pós ataque
          - name: legal_fees_usd
            description: Gastos da empresa com serviços jurídicos pós ataque
          - name: regulatory_fine_usd
            description: Valor de multa regulatória que a empresa recebeu pelo vazamento de dados
          - name: insurance_payout_usd
            description: Valor pago pela seguradora da empresa
          - name: total_loss_usd
            description: Gasto total da empresa, incluindo todos os valores
          - name: total_loss_method
            description: Método como foi feito o cálculo do valor do gasto total
          - name: total_loss_lower_bound
            description: Menor estimativa de valor gasto pela empresa
          - name: total_loss_upper_bound
            description: Maior estimativa de valor gasto pela empresa
          - name: inflation_adjusted_usd
            description: Valor ajustado pela inflação
          - name: cpi_index_used
            description: Índice de inflação (CPI) utilizado no cálculo
          - name: notes
            description: Descrição de notícia de ataque cibernético
          - name: created_at
            description: Dia e hora que o dado foi inserido no banco de dados

      - name: raw_incidents_master
        description: "Tabela com informações gerais de incidentes cibernéticos"
        columns:
          - name: incident_id
            description: Identificador único do incidente cibernético
            tests:
              - not_null
              - unique
          - name: company_name
            description: Nome da empresa afetada
          - name: company_revenue_usd
            description: Receita anual da empresa em USD
          - name: country_hq
            description: País da sede da empresa
          - name: industry_primary
            description: Código da indústria primária da empresa
          - name: industry_secondary
            description: Código da indústria secundária da empresa
          - name: employee_count
            description: Número de funcionários da empresa
          - name: is_public_company
            description: Indicador se a empresa é pública
          - name: stock_ticker
            description: Código de negociação da empresa (ticker)
          - name: incident_date
            description: Data em que o incidente ocorreu
          - name: incident_date_estimated
            description: Data estimada do incidente, caso não seja conhecida
          - name: discovery_date
            description: Data em que o incidente foi descoberto
          - name: disclosure_date
            description: Data em que o incidente foi divulgado publicamente
          - name: attack_vector_primary
            description: Vetor de ataque primário utilizado
          - name: attack_vector_secondary
            description: Vetor de ataque secundário utilizado
          - name: attack_chain
            description: Sequência de ataques ou técnicas utilizadas
          - name: attributed_group
            description: Grupo ou ator atribuído ao ataque
          - name: attribution_confidence
            description: Nível de confiança da atribuição
          - name: data_compromised_records
            description: Quantidade de registros de dados comprometidos
          - name: data_type
            description: Tipo de dado afetado
          - name: systems_affected
            description: Sistemas afetados pelo incidente
          - name: downtime_hours
            description: Horas de inatividade provocadas pelo incidente
          - name: data_source_primary
            description: Fonte principal da informação
          - name: data_source_secondary
            description: Fonte secundária da informação
          - name: data_source_type
            description: Tipo da fonte de dados
          - name: confidence_tier
            description: Nível de confiança da informação
          - name: quality_score
            description: Pontuação de qualidade da informação
          - name: quality_grade
            description: Nota de qualidade
          - name: review_flag
            description: Indicador de revisão
          - name: notes
            description: Notas adicionais sobre o incidente
          - name: created_at
            description: Data de criação do registro
          - name: updated_at
            description: Data de atualização do registro

      - name: raw_market_impact
        description: Tabela bruta contendo métricas de mercado financeiro relacionadas à divulgação pública de incidentes cibernéticos. Inclui preços das ações antes e após o evento, retornos anormais, retornos acumulados (CAR), métricas estatísticas, volume negociado indicadores de volatilidade.
        columns:
          - name: incident_id
            description: Identificador único do incidente cibernético.
            tests:
              - not_null
              - unique
          - name: stock_ticker
            description: Código de negociação da empresa na bolsa de valores.
          - name: price_7d_before
            description: Preço da ação 7 dias antes da data de divulgação do incidente.
          - name: price_disclosure_day
            description: Preço da ação no dia da divulgação pública do incidente.
          - name: price_1d_after
            description: Preço da ação 1 dia após a divulgação do incidente.
          - name: price_7d_after
            description: Preço da ação 7 dias após a divulgação do incidente.
          - name: price_30d_after
            description: Preço da ação 30 dias após a divulgação do incidente.
          - name: volume_avg_30d_baseline
            description: Volume médio negociado nos 30 dias anteriores ao incidente.
          - name: volume_disclosure_day
            description: Volume negociado no dia da divulgação do incidente.
          - name: sector_index
            description: Índice setorial ao qual a empresa pertence.
          - name: sector_return_same_period
            description: Retorno do índice setorial no mesmo período analisado para o evento.
          - name: abnormal_return_1d
            description: Retorno anormal da ação 1 dia após a divulgação.
          - name: abnormal_return_7d
            description: Retorno anormal acumulado até 7 dias após a divulgação.
          - name: abnormal_return_30d
            description: Retorno anormal acumulado até 30 dias após a divulgação.
          - name: car_neg1_to_pos1
            description: Retorno anormal acumulado (CAR) da janela -1 a +1 dias em relação à divulgação.
          - name: car_0_to_7
            description: Retorno anormal acumulado (CAR) da janela 0 a +7 dias após a divulgação.
          - name: car_0_to_30
            description: Retorno anormal acumulado (CAR) da janela 0 a +30 dias após a divulgação.
          - name: car_0_to_90
            description: Retorno anormal acumulado (CAR) da janela 0 a +90 dias após a divulgação.
          - name: t_statistic_1d
            description: Estatística t associada ao retorno anormal de 1 dia.
          - name: t_statistic_30d
            description: Estatística t associada ao retorno anormal acumulado de 30 dias.
          - name: p_value_30d
            description: Valor-p associado ao retorno anormal acumulado de 30 dias.
          - name: earnings_announcement_within_7d
            description: Indicador se houve anúncio de resultados financeiros dentro de 7 dias da divulgação do incidente.
          - name: market_cap_at_disclosure
            description: Capitalização de mercado da empresa no dia da divulgação do incidente.
          - name: volume_ratio_disclosure
            description: Razão entre o volume negociado no dia da divulgação e o volume médio dos 30 dias anteriores.
          - name: pre_incident_volatility_30d
            description: Volatilidade histórica da ação nos 30 dias anteriores ao incidente.
          - name: post_incident_volatility_30d
            description: Volatilidade histórica da ação nos 30 dias posteriores ao incidente.
          - name: days_to_price_recovery
            description: Número de dias necessários para o preço da ação retornar ao nível pré-incidente.
          - name: notes
            description: Observações adicionais relacionadas ao comportamento do mercado.
          - name: created_at
            description: Data e hora de criação do registro.
          - name: updated_at
            description: Data e hora da última atualização do registro.